version: 2
updates:
  # Rust crates. Group minor + patch into one weekly PR per ecosystem so the
  # inbox doesn't fill with churn. Major bumps still open individually so they
  # get a proper look (semver-breaking, may need code changes).
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    commit-message:
      prefix: deps
    labels:
      - dependencies
    groups:
      cargo-minor-patch:
        patterns: ['*']
        update-types: [minor, patch]

  # GitHub Actions versions — also grouped.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    commit-message:
      prefix: ci
    labels:
      - dependencies
    groups:
      actions-all:
        patterns: ['*']
