name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: build · clippy · test
    runs-on: ubuntu-latest

    services:
      # Tests don't currently hit Postgres, but build.rs / sqlx macros benefit
      # from the env being plausible. If/when tests want a live DB, point
      # DATABASE_URL at this service.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openexhibit
          POSTGRES_PASSWORD: openexhibit
          POSTGRES_DB: openexhibit
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --all -- --check

      - name: build
        run: cargo build --locked --all-targets

      - name: clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: test
        run: cargo test --locked --all-targets
