<!doctype html>
<html lang="{{ site_lang }}">
<head>
<meta charset="utf-8">
<title>{{ exhibit_title }} : {{ obj_name }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<link rel="stylesheet" href="/static/css/public.css" type="text/css">
<style>
/* Lightweight wrapper around the public-site theme tokens — uses
   --color / --color5 / --bg from public.css so the gate inherits
   the site palette / dark mode / custom-CSS overrides. */
.pwd-gate {
  max-width: 360px;
  margin: 6rem auto 0 auto;
  padding: 0 1.5rem;
  text-align: left;
}
.pwd-gate h1 {
  font-size: 1.1em;
  font-weight: 700;
  margin-bottom: 1em;
}
.pwd-gate p { margin-bottom: 1em; color: var(--color5); }
.pwd-gate label { display: block; margin-bottom: 0.75rem; }
.pwd-gate input[type="password"] {
  display: block;
  width: 100%;
  padding: 0.55rem 0.7rem;
  border: 1px solid var(--color5);
  background: transparent;
  color: var(--color);
  font: inherit;
  border-radius: 3px;
}
.pwd-gate input[type="password"]:focus {
  outline: none;
  border-color: var(--color);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--color) 18%, transparent);
}
.pwd-gate button {
  padding: 0.55rem 1.1rem;
  background: var(--color);
  color: var(--bg);
  border: 1px solid var(--color);
  border-radius: 3px;
  font: inherit;
  font-weight: 500;
  cursor: pointer;
}
.pwd-gate button:hover { filter: brightness(1.1); }
.pwd-gate .err {
  color: #c00;
  margin-bottom: 0.75rem;
  font-size: 0.9em;
}
</style>
</head>
<body class="password-gate">
<form method="post" action="{{ exhibit_url }}" class="pwd-gate">
  <input type="hidden" name="_csrf" value="{{ csrf_token }}">
  <h1>{{ exhibit_title }}</h1>
  <p>This exhibit is password-protected.</p>
  {%- if error %}
  <div class="err">Incorrect password.</div>
  {%- endif %}
  <label>
    <input type="password" name="password" autofocus required placeholder="Password">
  </label>
  <button type="submit">Enter</button>
</form>
</body>
</html>
