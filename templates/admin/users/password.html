{% extends "admin/layout.html" %}
{% block content %}
<div class="page-header">
  <h1>Change password: {{ user.userid }}</h1>
  <a href="/admin/users">&larr; All users</a>
</div>
<form method="post" action="/admin/users/{{ user.id }}/password" class="form-stack">
  <input type="hidden" name="_csrf" value="{{ csrf_token }}">
  <label><span>New password</span><input type="password" name="password" autocomplete="new-password" required minlength="10"></label>
  <label><span>Confirm</span><input type="password" name="confirm" autocomplete="new-password" required minlength="10"></label>
  <div class="form-actions">
    <button type="submit" class="primary">Set new password</button>
    <a href="/admin/users" class="btn">Cancel</a>
  </div>
</form>
{% endblock %}
