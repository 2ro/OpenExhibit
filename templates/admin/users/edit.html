{% extends "admin/layout.html" %}
{% block content %}
<div class="page-header">
  <h1>{% if user.id == 0 %}New user{% else %}Edit: {{ user.userid }}{% endif %}</h1>
  <a href="/admin/users">&larr; All users</a>
</div>
<form method="post" action="{% if user.id == 0 %}/admin/users/new{% else %}/admin/users/{{ user.id }}/edit{% endif %}" class="form-stack">
  <input type="hidden" name="_csrf" value="{{ csrf_token }}">
  <label><span>User ID (login)</span><input type="text" name="userid" value="{{ user.userid }}" required></label>
  <label><span>Email</span><input type="email" name="email" value="{{ user.email }}" required></label>
  <label><span>First name</span><input type="text" name="first_name" value="{{ user.first_name }}"></label>
  <label><span>Last name</span><input type="text" name="last_name" value="{{ user.last_name }}"></label>
  {%- if user.id == 0 %}
  <label><span>Password</span><input type="password" name="password" autocomplete="new-password" required minlength="10"></label>
  {%- endif %}
  <label class="checkbox">
    <input type="checkbox" name="is_admin" value="1"{% if user.is_admin %} checked{% endif %}>
    <span>Admin</span>
  </label>
  <label class="checkbox">
    <input type="checkbox" name="is_active" value="1"{% if user.is_active %} checked{% endif %}>
    <span>Active</span>
  </label>
  <div class="form-actions">
    <button type="submit" class="primary">Save</button>
    <a href="/admin/users" class="btn">Cancel</a>
  </div>
</form>
{% endblock %}
