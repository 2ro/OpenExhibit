{% extends "admin/layout.html" %}
{% block content %}
<h1>Delete user?</h1>
<p>Delete <strong>{{ user.userid }}</strong>? This cannot be undone.</p>
<form method="post" action="/admin/users/{{ user.id }}/delete" class="form-stack">
  <input type="hidden" name="_csrf" value="{{ csrf_token }}">
  <div class="form-actions">
    <button type="submit" class="danger">Yes, delete</button>
    <a href="/admin/users" class="btn">Cancel</a>
  </div>
</form>
{% endblock %}
