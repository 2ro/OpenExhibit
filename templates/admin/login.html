<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Log in : OpenExhibit Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<link rel="stylesheet" href="/static/css/admin.css" type="text/css">
</head>
<body class="login-page">
<main class="login-main">
  <h1>OpenExhibit</h1>
  {%- if let Some(e) = error %}
  <div class="flash error">{{ e }}</div>
  {%- endif %}
  <form method="post" action="/admin/login" class="login-form">
    <input type="hidden" name="_csrf" value="{{ csrf_token }}">
    <label>
      <span>Username</span>
      <input type="text" name="userid" autocomplete="username" autofocus required>
    </label>
    <label>
      <span>Password</span>
      <input type="password" name="password" autocomplete="current-password" required>
    </label>
    <button type="submit">Log in</button>
  </form>
  <p style="margin-top: 1rem; text-align: center;"><a href="/admin/forgot">Forgot password?</a></p>
</main>
</body>
</html>
