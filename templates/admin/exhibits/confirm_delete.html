{% extends "admin/layout.html" %}
{% block content %}
<h1>Delete exhibit?</h1>
<p>Are you sure you want to delete <strong>{{ exhibit.title }}</strong> (<code>{{ exhibit.url }}</code>)?</p>
<p>All associated media will be detached. This cannot be undone.</p>
<form method="post" action="/admin/exhibits/{{ exhibit.id }}/delete" class="form-stack">
  <input type="hidden" name="_csrf" value="{{ csrf_token }}">
  <div class="form-actions">
    <button type="submit" class="danger">Yes, delete</button>
    <a href="/admin/exhibits" class="btn">Cancel</a>
  </div>
</form>
{% endblock %}
